<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JR Club - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#eff1f3",
                        "secondary": "#376093",
                        "tertiary-container": "#b55002",
                        "inverse-primary": "#a7c8ff",
                        "surface-container-high": "#e6e8ea",
                        "on-tertiary-fixed": "#331100",
                        "on-secondary-fixed-variant": "#1b487a",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#414752",
                        "primary-fixed-dim": "#a7c8ff",
                        "surface-container-low": "#f2f4f6",
                        "tertiary-fixed": "#ffdbca",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-secondary-container": "#275284",
                        "secondary-fixed": "#d4e3ff",
                        "surface-bright": "#f7f9fb",
                        "tertiary-fixed-dim": "#ffb68f",
                        "secondary-fixed-dim": "#a4c9ff",
                        "on-primary-fixed": "#001b3c",
                        "tertiary": "#8f3d00",
                        "on-secondary-fixed": "#001c39",
                        "primary-fixed": "#d5e3ff",
                        "error": "#ba1a1a",
                        "on-background": "#191c1e",
                        "on-primary-container": "#eef2ff",
                        "on-tertiary-container": "#ffeee8",
                        "on-surface": "#191c1e",
                        "on-error": "#ffffff",
                        "surface-container": "#eceef0",
                        "on-tertiary": "#ffffff",
                        "background": "#f7f9fb",
                        "surface-dim": "#d8dadc",
                        "on-primary-fixed-variant": "#004788",
                        "on-primary": "#ffffff",
                        "outline": "#717784",
                        "inverse-surface": "#2d3133",
                        "secondary-container": "#9fc6ff",
                        "outline-variant": "#c1c6d5",
                        "surface-container-highest": "#e0e3e5",
                        "primary": "#0056a4",
                        "surface-variant": "#e0e3e5",
                        "error-container": "#ffdad6",
                        "primary-container": "#006ecf",
                        "surface-tint": "#005eb2",
                        "on-tertiary-fixed-variant": "#773200"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Inter", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col justify-center sm:px-6 lg:px-8 bg-gradient-to-br from-surface to-surface-container-high">
<!-- Auth Container -->
<main class="sm:mx-auto sm:w-full sm:max-w-md px-4 sm:px-0">
<!-- Logo Header -->
<div class="text-center mb-10">
<h1 class="font-headline font-black text-4xl tracking-tighter text-primary uppercase">JR CLUB</h1>
<p class="mt-2 text-sm text-on-surface-variant font-medium tracking-wide">THE ACTIVE AUTHORITY</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest py-8 px-6 shadow-[0px_12px_32px_rgba(15,23,42,0.06)] rounded-xl sm:px-10 border border-surface-container-highest/50">
<h2 class="font-headline text-xl font-bold tracking-tight text-on-surface mb-6 text-center">
                Access Your Account
            </h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input Group -->
<div>
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em] mb-2" for="email">
                        Corporate Email
                    </label>
<div class="relative">
<input autocomplete="email" class="block w-full appearance-none bg-surface-container-low border-0 border-b-2 border-outline-variant/20 rounded-t-md px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:outline-none focus:ring-0 sm:text-sm transition-colors duration-200" id="email" name="email" placeholder="employee@jasaraharja.co.id" required="" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-3.5 text-on-surface-variant/50 pointer-events-none" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Input Group -->
<div>
<label class="block text-[0.6875rem] font-bold text-on-surface-variant uppercase tracking-[0.05em] mb-2" for="password">
                        Password
                    </label>
<div class="relative">
<input autocomplete="current-password" class="block w-full appearance-none bg-surface-container-low border-0 border-b-2 border-outline-variant/20 rounded-t-md px-4 py-3 text-on-surface placeholder-on-surface-variant/50 focus:border-primary focus:outline-none focus:ring-0 sm:text-sm transition-colors duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<span class="material-symbols-outlined absolute right-3 top-3.5 text-on-surface-variant cursor-pointer hover:text-primary transition-colors" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between mt-4">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant/50 text-primary focus:ring-primary bg-surface-container-low cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant cursor-pointer" for="remember-me">
                            Remember me
                        </label>
</div>
<div class="text-sm">
<a class="font-bold text-primary hover:text-primary-container transition-colors" href="#">
                            Forgot password?
                        </a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="flex w-full justify-center items-center gap-2 rounded-md bg-gradient-to-br from-primary to-primary-container px-4 py-3.5 text-sm font-bold text-on-primary shadow-[0px_8px_16px_rgba(0,86,164,0.15)] hover:shadow-[0px_12px_24px_rgba(0,86,164,0.25)] hover:scale-[0.98] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-primary transition-all duration-200" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Footer Links -->
<p class="mt-8 text-center text-sm text-on-surface-variant">
            Don't have an account? 
            <a class="font-bold text-primary hover:text-primary-container transition-colors" href="#">
                Request access
            </a>
</p>
</main>
</body></html>
