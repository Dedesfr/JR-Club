<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>JR Club - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed-dim": "#a7c8ff",
                    "secondary": "#005eb2",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#a7c8ff",
                    "primary": "#003f7b",
                    "error-container": "#ffdad6",
                    "surface-dim": "#d8dadc",
                    "primary-container": "#0056a4",
                    "outline": "#727782",
                    "secondary-fixed": "#d5e3ff",
                    "on-secondary-container": "#003365",
                    "on-error": "#ffffff",
                    "background": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "inverse-surface": "#2d3133",
                    "on-error-container": "#93000a",
                    "surface-bright": "#f7f9fb",
                    "tertiary-container": "#903e01",
                    "surface-variant": "#e0e3e5",
                    "on-secondary": "#ffffff",
                    "surface-tint": "#165ead",
                    "on-tertiary-fixed": "#331100",
                    "surface-container-low": "#f2f4f6",
                    "secondary-container": "#529cff",
                    "on-primary-container": "#b0cdff",
                    "on-primary": "#ffffff",
                    "tertiary-fixed": "#ffdbca",
                    "on-surface": "#191c1e",
                    "surface-container-highest": "#e0e3e5",
                    "on-tertiary-fixed-variant": "#783200",
                    "surface-container-high": "#e6e8ea",
                    "primary-fixed": "#d5e3ff",
                    "on-primary-fixed-variant": "#004788",
                    "on-secondary-fixed": "#001b3c",
                    "surface-container": "#eceef0",
                    "outline-variant": "#c2c6d3",
                    "tertiary": "#6c2c00",
                    "on-tertiary": "#ffffff",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#424751",
                    "on-tertiary-container": "#ffbe9c",
                    "on-background": "#191c1e",
                    "on-secondary-fixed-variant": "#004788",
                    "inverse-primary": "#a7c8ff",
                    "inverse-on-surface": "#eff1f3",
                    "on-primary-fixed": "#001b3c",
                    "tertiary-fixed-dim": "#ffb690"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Inter"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Inter"
                    ]
            }
        },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col justify-center items-center p-6 relative overflow-hidden">
<!-- Background Design Element (Kinetic Feel) -->
<div class="absolute top-[-10%] right-[-20%] w-96 h-96 bg-primary-fixed rounded-full blur-3xl opacity-30 z-0"></div>
<div class="absolute bottom-[-10%] left-[-20%] w-80 h-80 bg-secondary-fixed rounded-full blur-3xl opacity-30 z-0"></div>
<main class="w-full max-w-md z-10 flex flex-col gap-8">
<!-- Hero Section -->
<header class="text-center flex flex-col items-center gap-4">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-[0_12px_32px_-4px_rgba(25,28,30,0.12)]">
<span class="material-symbols-outlined text-white text-3xl font-black" style="font-variation-settings: 'FILL' 1;">
                    shield_person
                </span>
</div>
<div class="flex flex-col gap-1">
<h1 class="font-headline font-black text-4xl tracking-tighter text-on-surface">Welcome Back</h1>
<p class="font-body text-sm text-on-surface-variant">Sign in to access your JR Club portal.</p>
</div>
</header>
<!-- Login Card -->
<section class="bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_-4px_rgba(25,28,30,0.06)] p-8 flex flex-col gap-6 w-full relative z-20">
<form class="flex flex-col gap-6">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant px-3">mail</span>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/20 rounded-t-DEFAULT pl-10 pr-4 py-3 text-sm text-on-surface focus:ring-0 focus:border-primary transition-colors font-body outline-none" id="email" placeholder="member@jrclub.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-on-surface" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant px-3">lock</span>
<input class="w-full bg-surface-container-low border-0 border-b border-outline-variant/20 rounded-t-DEFAULT pl-10 pr-12 py-3 text-sm text-on-surface focus:ring-0 focus:border-primary transition-colors font-body outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 px-3 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility_off</span>
</button>
</div>
</div>
<!-- CTA -->
<div class="mt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-label text-sm font-bold uppercase tracking-wider py-4 rounded-full shadow-[0_12px_32px_-4px_rgba(25,28,30,0.12)] hover:opacity-90 transition-opacity active:scale-[0.98]" type="submit">
                        Sign In
                    </button>
</div>
</form>
</section>
<!-- Footer -->
<footer class="text-center z-10">
<a class="font-label text-[0.6875rem] font-bold uppercase tracking-[0.05em] text-primary hover:text-primary-container transition-colors" href="#">
                Need help signing in?
            </a>
</footer>
</main>
</body></html>
