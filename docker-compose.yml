services:
  app:
    build:
      context: .
    volumes:
      - .:/var/www/html
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jrclub
      POSTGRES_USER: jrclub
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  reverb:
    build:
      context: .
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8081:8080"
    volumes:
      - .:/var/www/html
    depends_on:
      - app

  queue:
    build:
      context: .
    command: php artisan queue:work --tries=3
    volumes:
      - .:/var/www/html
    depends_on:
      - app
      - postgres

volumes:
  postgres-data:
