<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview — League Matches (Low-fi)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-100 text-gray-900 p-4 md:p-8">

  <div class="max-w-6xl mx-auto space-y-8">
    <!-- Header -->
    <header class="border-b border-gray-300 pb-4">
      <h1 class="text-2xl font-bold">League Matches</h1>
      <p class="text-gray-600">Structural preview only. No brand colors or specific typography applied.</p>
    </header>

    <!-- Section: Stage Header -->
    <section>
      <h3 class="text-lg font-bold border-b-2 border-gray-300 pb-2 mb-4">Group Stage</h3>

      <!-- Section: Desktop Match List -->
      <div class="hidden md:flex flex-col gap-3">
        
        <!-- Active Match Row -->
        <div class="flex items-center justify-between bg-white border border-gray-300 rounded p-4">
          <!-- Time & Status -->
          <div class="w-[15%] flex flex-col">
            <span class="text-xs text-gray-500 uppercase">22 Apr, 10:00</span>
            <span class="text-xs font-bold text-gray-700 uppercase mt-1">Live</span>
          </div>
          
          <!-- Matchup -->
          <div class="w-[50%] flex items-center justify-center gap-4">
            <div class="flex-1 text-right font-semibold text-gray-800">Team Alpha</div>
            <div class="bg-gray-100 border border-gray-300 rounded px-4 py-2 text-xl font-bold">1 - 0</div>
            <div class="flex-1 text-left font-semibold text-gray-800">Team Beta</div>
          </div>

          <!-- Sets -->
          <div class="w-[20%] flex flex-wrap justify-center gap-1 px-2">
            <span class="text-xs bg-gray-200 border border-gray-300 px-2 py-1 rounded">21-19</span>
            <span class="text-xs bg-gray-200 border border-gray-300 px-2 py-1 rounded">15-10</span>
          </div>

          <!-- Actions -->
          <div class="w-[15%] flex flex-col items-end gap-2">
            <div class="flex gap-2">
              <button class="text-xs text-gray-600 underline">Sub</button>
              <button class="text-xs text-gray-600 underline">Photos</button>
            </div>
            <button class="text-xs bg-gray-200 border border-gray-400 px-3 py-1 rounded">Add Set</button>
          </div>
        </div>

        <!-- Upcoming Match Row -->
        <div class="flex items-center justify-between bg-white border border-gray-300 rounded p-4 opacity-75">
          <div class="w-[15%] flex flex-col">
            <span class="text-xs text-gray-500 uppercase">22 Apr, 14:00</span>
            <span class="text-xs font-bold text-gray-500 uppercase mt-1">Upcoming</span>
          </div>
          <div class="w-[50%] flex items-center justify-center gap-4">
            <div class="flex-1 text-right font-semibold text-gray-800">Team Gamma</div>
            <div class="bg-gray-100 border border-gray-300 rounded px-4 py-2 text-xl font-bold">0 - 0</div>
            <div class="flex-1 text-left font-semibold text-gray-800">Team Delta</div>
          </div>
          <div class="w-[20%] flex flex-wrap justify-center gap-1 px-2">
            <span class="text-xs text-gray-400 italic">-</span>
          </div>
          <div class="w-[15%] flex flex-col items-end gap-2">
            <button class="text-xs bg-gray-200 border border-gray-400 px-3 py-1 rounded">Open Match</button>
          </div>
        </div>
      </div>

      <!-- Section: Mobile Match List -->
      <div class="md:hidden flex flex-col gap-4 mt-8">
        <h4 class="text-sm font-bold text-gray-500 uppercase">Mobile Layout</h4>
        
        <!-- Mobile Card -->
        <div class="bg-white border border-gray-300 rounded p-4">
          <div class="flex justify-between items-center border-b border-gray-200 pb-2 mb-3">
            <span class="text-xs text-gray-500">22 Apr, 10:00</span>
            <span class="text-xs font-bold text-gray-700 uppercase">Live</span>
          </div>
          <div class="flex justify-between items-center mb-3">
            <div class="flex flex-col gap-1">
              <span class="font-semibold">Team Alpha</span>
              <span class="font-semibold">Team Beta</span>
            </div>
            <div class="flex flex-col gap-1 text-right">
              <span class="text-xl font-bold">1</span>
              <span class="text-xl font-bold">0</span>
            </div>
          </div>
          <div class="flex gap-1 border-t border-gray-200 pt-2 mb-3">
            <span class="text-xs bg-gray-200 border border-gray-300 px-2 py-1 rounded">21-19</span>
            <span class="text-xs bg-gray-200 border border-gray-300 px-2 py-1 rounded">15-10</span>
          </div>
          <div class="flex justify-between items-center pt-2 border-t border-gray-200">
            <div class="flex gap-3">
              <button class="text-xs text-gray-600 underline">Sub</button>
              <button class="text-xs text-gray-600 underline">Photos</button>
            </div>
            <button class="text-xs bg-gray-200 border border-gray-400 px-3 py-1 rounded">Add Set</button>
          </div>
        </div>

      </div>

    </section>
  </div>
</body>
</html>
